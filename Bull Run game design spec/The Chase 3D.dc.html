<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<script src="./bullrun-art.js"></script>
<script src="./bullrun-sfx.js"></script>
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#0b0906}
a{color:#f2b23a}a:hover{color:#ffd070}
@keyframes tc-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes tc-fade{from{opacity:0}to{opacity:1}}
</style>
</helmet>

<div style="position:fixed;inset:0;overflow:hidden;font-family:'Pixelify Sans',system-ui,sans-serif;user-select:none;background:#0b0906" data-screen-label="The Chase 3D — cinematic">

  <canvas ref="{{ canvasRef }}" style="position:absolute;inset:0;display:block"></canvas>

  <sc-if value="{{ started }}" hint-placeholder-val="{{ false }}">
    <button onClick="{{ onReplay }}" style="position:absolute;top:20px;right:20px;z-index:30;display:inline-flex;align-items:center;gap:8px;background:#2e2318;border:3px solid #17100a;border-radius:11px;padding:8px 15px;box-shadow:0 4px 0 rgba(0,0,0,.4);color:#f3e7cd;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer" style-hover="transform:translateY(-2px)">↻ Replay</button>
  </sc-if>

  <sc-if value="{{ showPlay }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(11,9,6,.55);animation:tc-fade .4s ease-out">
      <div style="text-align:center;line-height:1">
        <div style="color:#f3e7cd;font-size:15px;font-weight:600;letter-spacing:5px;opacity:.7">A BULL RUN SHORT</div>
        <div style="color:#f2b23a;font-size:76px;font-weight:700;letter-spacing:2px;text-shadow:0 5px 0 #17100a;margin-top:6px">THE CHASE</div>
        <div style="color:#f3e7cd;font-size:18px;font-weight:700;letter-spacing:8px;margin-top:12px;opacity:.85">— NOW IN 3D —</div>
      </div>
      <button onClick="{{ onPlay }}" style="display:inline-flex;align-items:center;gap:12px;background:#f2b23a;border:4px solid #17100a;border-radius:16px;padding:15px 34px;box-shadow:0 6px 0 rgba(0,0,0,.45);color:#201405;font-family:inherit;font-size:24px;font-weight:700;cursor:pointer;animation:tc-pulse 2s ease-in-out infinite" style-hover="filter:brightness(1.06)">▶ &nbsp;PLAY</button>
      <div style="color:rgba(243,231,205,.55);font-size:13px;font-weight:600;letter-spacing:1px">sound on · 15 seconds · voxel-rendered live</div>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;680px&quot;},&quot;bullCount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:88,&quot;min&quot;:3,&quot;max&quot;:10,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Cinematic&quot;},&quot;letterbox&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Cinematic&quot;},&quot;pixel&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;smooth&quot;,&quot;options&quot;:[&quot;chunky&quot;,&quot;smooth&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Cinematic&quot;}}">
class Component extends DCLogic {
  state = { started: false };
  canvasRef = React.createRef();

  // ---- timeline (seconds) ----
  IDLE_END = 3.0; LISTEN_END = 5.3; RUSH_END = 8.6; BEAT_END = 9.5;
  STAMP = 11.1; EXIT = 13.3;
  XS = 10;                    // where he gets stomped

  componentDidMount() {
    this.startAt = 0; this.prevAt = 0; this.parts = []; this._burst = false;
    try { window.__chase = this; } catch (e) {}
    this.onResize = () => this.resize();
    window.addEventListener('resize', this.onResize);
    this.lastT = performance.now();
    this.boot();
  }
  boot() {
    const el = this.canvasRef.current || document.querySelector('canvas');
    if (!el || !window.BRArt) { this._b = requestAnimationFrame(() => this.boot()); return; }
    this.canvas = el; this.ctx = el.getContext('2d'); this.resize();
    this.raf = requestAnimationFrame((t) => this.frame(t));
  }
  componentWillUnmount() {
    cancelAnimationFrame(this.raf); cancelAnimationFrame(this._b);
    window.removeEventListener('resize', this.onResize);
  }
  resize() {
    const dpr = Math.min(1.6, window.devicePixelRatio || 1);
    this.canvas.width = innerWidth * dpr; this.canvas.height = innerHeight * dpr;
    this.canvas.style.width = innerWidth + 'px'; this.canvas.style.height = innerHeight + 'px';
    this.dpr = dpr;
  }
  onPlay = () => { window.BRSfx && BRSfx.unlock(); this.reset(); this.setState({ started: true }); };
  onReplay = () => { this.reset(); };
  reset() { this.startAt = performance.now() / 1000; this.prevAt = 0; this.parts = []; this._burst = false; }
  seek(t) {
    const now = performance.now() / 1000;
    this.startAt = now - t; this.prevAt = t; this._burst = t >= this.STAMP; this.parts = [];
    if (!this.state.started) this.setState({ started: true });
    if (this.ctx) this.draw(t, now);
  }

  // ---- math ----
  ss(x) { x = x < 0 ? 0 : x > 1 ? 1 : x; return x * x * (3 - 2 * x); }
  lerp(a, b, x) { return a + (b - a) * this.ss(x); }
  rgbOf(c) { const n = parseInt(c.slice(1), 16); return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
  shade(hex, f) { const [r, g, b] = this.rgbOf(hex); const cl = v => Math.max(0, Math.min(255, Math.round(v * f))); return '#' + ((1 << 24) + (cl(r) << 16) + (cl(g) << 8) + cl(b)).toString(16).slice(1); }
  mixc(h1, h2, t) { const a = this.rgbOf(h1), b = this.rgbOf(h2); const ch = i => Math.round(a[i] + (b[i] - a[i]) * t); return '#' + ((1 << 24) + (ch(0) << 16) + (ch(1) << 8) + ch(2)).toString(16).slice(1); }

  // ---- choreography ----
  guyX(at) {
    const B = this.BEAT_END, S = this.STAMP;
    if (at <= B) return 0;
    if (at >= S) return this.XS;
    const r = (at - B) / (S - B); return this.XS * r * r;
  }
  herdX(at) {
    const L = this.LISTEN_END, R = this.RUSH_END, B = this.BEAT_END, S = this.STAMP, E = this.EXIT;
    if (at < L) return -55;
    if (at < R) return this.lerp(-55, -14, (at - L) / (R - L));
    if (at < B) return this.lerp(-14, -4.5, (at - R) / (B - R));
    if (at < S) return this.lerp(-4.5, this.XS + 1.5, (at - B) / (S - B));
    if (at < E) { const r = (at - S) / (E - S); return this.XS + 1.5 + 40 * r * r; }
    return this.XS + 41.5 + (at - E) * 22;
  }
  shakeAmt(at) {
    const L = this.LISTEN_END, R = this.RUSH_END, B = this.BEAT_END, S = this.STAMP, E = this.EXIT;
    if (at < L) return 0;
    if (at < R) return this.lerp(0, 3, (at - L) / (R - L));
    if (at < B) return 3.5;
    if (at < S) return this.lerp(3.5, 6.5, (at - B) / (S - B));
    if (at < S + 0.35) return 11;
    if (at < E + 0.8) return 6 * (1 - (at - (S + 0.35)) / ((E + 0.8) - (S + 0.35)));
    return 0;
  }
  camera(at, now) {
    const dr = Math.sin(now * 0.35), guy = this.guyX(at), XS = this.XS;
    if (at < this.IDLE_END) return { ex: 7.2 + dr * 0.3, ey: 3.6, ez: 3.1, tx: 0, ty: 0, tz: 2.7 };
    if (at < this.LISTEN_END) return { ex: 5.0, ey: -2.7 + dr * 0.2, ez: 2.9, tx: 0, ty: 0, tz: 3.5 };
    if (at < this.RUSH_END) return { ex: 7.6, ey: 1.2, ez: 3.7, tx: -9, ty: 0, tz: 2.0 };
    if (at < this.BEAT_END) return { ex: 3.6, ey: 2.1, ez: 3.2, tx: 0, ty: 0, tz: 4.3 };
    if (at < this.STAMP) return { ex: guy + 6.6, ey: 1.0, ez: 3.1, tx: guy - 2, ty: 0, tz: 3.5 };
    if (at < this.EXIT) return { ex: XS + 9, ey: 2.6, ez: 3.8, tx: XS, ty: 0, tz: 1.4 };
    const r = Math.min(1, (at - this.EXIT) / 2.4);
    return { ex: XS + 9 - r * 2.8, ey: 2.6 + r * 1.6, ez: 3.8 + r * 1.3, tx: XS, ty: 0, tz: 1.0 };
  }
  herd() {
    const n = Math.max(3, Math.min(10, Math.round(this.props.bullCount ?? 8)));
    const palette = ['#b3352e', '#23201d', '#7d3fb0', '#4e9e3a', '#2f6fb0', '#2fa39a', '#d07a2a', '#c9a05a', '#6e4526', '#9aa0a6'];
    const lanes = [0, -2.7, 2.7, -5.1, 5.1];
    const H = window.BRArt.hash, out = [];
    for (let i = 0; i < n; i++) {
      out.push({
        coat: palette[i % palette.length],
        dy: lanes[i % 5] + (H(i, 7, 3) - 0.5) * 0.8,
        dx: -Math.floor(i / 5) * 8 - H(i, 3, 1) * 4.5,
        ph: i * 1.15
      });
    }
    return out;
  }

  frame(tms) {
    const now = tms / 1000;
    const dt = Math.min(0.05, (tms - this.lastT) / 1000); this.lastT = tms;
    const at = this.state.started ? (now - this.startAt) : 0;
    this.updateParts(dt, at);
    this.draw(at, now);
    if (this.state.started) { this.audioTick(this.prevAt, at); this.prevAt = at; }
    this.raf = requestAnimationFrame((t) => this.frame(t));
  }

  // ---- 3D dust ----
  updateParts(dt, at) {
    const p = this.parts;
    for (let i = p.length - 1; i >= 0; i--) {
      const d = p[i]; d.age += dt;
      if (d.age >= d.life) { p.splice(i, 1); continue; }
      d.x += d.vx * dt; d.y += d.vy * dt; d.z += d.vz * dt; d.vz *= 0.95;
    }
    if (!this.state.started) return;
    if (at > this.LISTEN_END + 0.3 && at < this.EXIT + 0.5 && p.length < 130) {
      const hx = this.herdX(at);
      for (let s = 0; s < 3; s++) {
        p.push({ x: hx - 2 - Math.random() * 8, y: (Math.random() - 0.5) * 11, z: 0.4, vx: -1.5 - Math.random() * 2, vy: (Math.random() - 0.5) * 1.5, vz: 3 + Math.random() * 4, age: 0, life: 0.8 + Math.random() * 0.9, r0: 0.7 + Math.random() * 1.1 });
      }
    }
    if (at > this.BEAT_END + 0.1 && at < this.STAMP && p.length < 145 && Math.random() < 0.8) {
      p.push({ x: this.guyX(at) - 0.9, y: (Math.random() - 0.5) * 0.8, z: 0.25, vx: -1.2, vy: (Math.random() - 0.5), vz: 2.5 + Math.random() * 3, age: 0, life: 0.6, r0: 0.4 + Math.random() * 0.5 });
    }
    if (at >= this.STAMP && !this._burst) {
      this._burst = true;
      for (let s = 0; s < 42; s++) {
        const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
        p.push({ x: this.XS + Math.cos(a) * 0.5, y: Math.sin(a) * 0.5, z: 0.5, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, vz: 4 + Math.random() * 7, age: 0, life: 1 + Math.random() * 1.1, r0: 0.8 + Math.random() * 1.4 });
      }
    }
  }

  // ---- voxel models ----
  bullBoxes(B, bx, by, coat, ph, moving) {
    const SB = 0.62, C = coat;
    const belly = this.mixc(C, '#e8d9b8', 0.35), muzzle = '#d8b58a', horn = '#efe8d8', hoof = '#2b2118';
    const dark = this.shade(C, 0.82), darker = this.shade(C, 0.85);
    const s1 = moving ? Math.sin(ph) : 0;
    const bob = moving ? Math.abs(Math.cos(ph)) * 0.55 : Math.sin(ph * 0.3) * 0.08;
    const hb = bob + (moving ? Math.sin(ph + 0.6) * 0.35 : 0);
    const box = (x, y, z, w, d, h, c) => B.push({ x: bx + x * SB, y: by + y * SB, z: z * SB, w: w * SB, d: d * SB, h: h * SB, c });
    box(-4.6, -1.9, 1.9 + bob, 1.8, 3.8, 3.1, C);                 // hindquarters
    box(-3.2, -2.1, 1.8 + bob, 6.0, 4.2, 3.5, C);                 // body
    box(-3.0, -1.8, 1.3 + bob, 5.4, 3.6, 0.5, belly);             // belly
    box(1.2, -1.7, 5.3 + bob, 2.2, 3.4, 1.25, C);                 // hump
    box(2.6, -1.3, 3.2 + hb, 1.4, 2.6, 2.6, C);                   // neck
    const hz = 3.6 + hb;
    box(3.7, -1.25, hz, 1.9, 2.5, 2.5, C);                        // head
    box(3.9, -0.9, hz + 2.5, 1.5, 1.8, 0.4, this.shade(C, 0.8));  // tuft
    box(5.6, -0.95, hz - 0.1, 1.1, 1.9, 1.5, muzzle);             // snout
    box(6.55, -0.6, hz + 0.35, 0.18, 0.34, 0.4, '#3a2a1a');       // nostrils
    box(6.55, 0.26, hz + 0.35, 0.18, 0.34, 0.4, '#3a2a1a');
    box(5.1, -1.32, hz + 1.35, 0.5, 0.14, 0.55, '#f5f2e8');       // eyes
    box(5.3, -1.36, hz + 1.45, 0.26, 0.16, 0.35, '#17100a');
    box(5.1, 1.18, hz + 1.35, 0.5, 0.14, 0.55, '#f5f2e8');
    box(5.3, 1.2, hz + 1.45, 0.26, 0.16, 0.35, '#17100a');
    box(4.9, -1.34, hz + 1.95, 0.8, 0.18, 0.28, '#17100a');       // angry brows
    box(4.9, 1.16, hz + 1.95, 0.8, 0.18, 0.28, '#17100a');
    box(4.0, -2.0, hz + 1.7, 0.7, 0.75, 0.55, darker);            // ears
    box(4.0, 1.25, hz + 1.7, 0.7, 0.75, 0.55, darker);
    const hbz = hz + 2.2;                                          // horns (classic)
    box(4.2, -2.7, hbz, 0.55, 0.9, 0.55, horn);
    box(4.25, -2.95, hbz + 0.5, 0.45, 0.5, 1.1, horn);
    box(4.2, 1.8, hbz, 0.55, 0.9, 0.55, horn);
    box(4.25, 2.45, hbz + 0.5, 0.45, 0.5, 1.1, horn);
    const leg = (lx, ly, front) => {                               // gallop
      const lift = (front ? Math.max(0, s1) : Math.max(0, -s1)) * 1.4;
      const swing = (front ? s1 : -s1) * 1.0;
      box(lx + swing, ly, 0.55 + lift, 0.85, 0.85, 1.5 + bob, dark);
      box(lx + swing - 0.03, ly - 0.03, lift, 0.91, 0.91, 0.58, hoof);
    };
    leg(2.1, -1.85, true); leg(2.1, 1.0, true); leg(-3.9, -1.85, false); leg(-3.9, 1.0, false);
    box(-4.95, -0.25 + s1 * 0.3, 3.9 + bob, 0.5, 0.5, 0.9, darker); // tail
    box(-5.05, -0.22 + s1 * 0.6, 2.7 + bob, 0.42, 0.42, 1.3, this.shade(C, 0.8));
    box(-5.12, -0.28 + s1 * 0.9, 1.9 + bob, 0.55, 0.55, 0.9, '#241608');
  }

  guyBoxes(B, gx, ph, moving, scared, at) {
    const skin = '#e8c49a', shirt = '#e8a33d', shirtD = this.shade('#e8a33d', 0.9), pants = '#5a4632';
    const sw = moving ? Math.sin(ph) : 0;
    const bob = moving ? Math.abs(Math.cos(ph)) * 0.35 : 0;
    const box = (x, y, z, w, d, h, c) => B.push({ x: gx + x, y, z, w, d, h, c });
    // legs (run: swing along x + lift)
    box(-0.35 + sw * 0.55, -0.62, Math.max(0, sw) * 0.55, 0.6, 0.55, 2.1, pants);
    box(-0.35 - sw * 0.55, 0.07, Math.max(0, -sw) * 0.55, 0.6, 0.55, 2.1, pants);
    box(-0.72, -0.92, 2.05 + bob, 1.44, 1.84, 0.35, '#2e2318');    // belt
    box(-0.7, -0.9, 2.4 + bob, 1.4, 1.8, 2.3, shirt);              // torso
    // arms swing opposite
    box(-0.45 - sw * 0.5, -1.32, 2.6 + bob, 0.45, 0.42, 1.7, shirtD);
    box(-0.45 - sw * 0.5, -1.32, 2.15 + bob, 0.45, 0.42, 0.5, skin);
    box(-0.45 + sw * 0.5, 0.9, 2.6 + bob, 0.45, 0.42, 1.7, shirtD);
    box(-0.45 + sw * 0.5, 0.9, 2.15 + bob, 0.45, 0.42, 0.5, skin);
    const hz = 4.7 + bob;
    box(-0.55, -0.65, hz, 1.1, 1.3, 1.35, skin);                   // head
    // face on +x side
    box(0.55, -0.42, hz + 0.78, 0.09, 0.26, 0.34, '#241608');      // eyes
    box(0.55, 0.16, hz + 0.78, 0.09, 0.26, 0.34, '#241608');
    if (scared) box(0.55, -0.18, hz + 0.18, 0.09, 0.38, 0.42, '#7a2a1e'); // open mouth
    else if (at < this.IDLE_END) box(0.55, -0.11, hz + 0.28, 0.09, 0.24, 0.24, '#8a5a3a'); // whistling
    box(-0.85, -0.95, hz + 1.28, 1.7, 1.9, 0.16, '#d9b45a');       // hat brim
    box(-0.5, -0.6, hz + 1.44, 1.0, 1.2, 0.55, '#c9a44a');         // hat crown
    box(-0.52, -0.62, hz + 1.44, 1.04, 1.24, 0.18, '#8e3b2e');     // band
  }

  flatBoxes(B) {
    const XS = this.XS;
    const box = (x, y, z, w, d, h, c) => B.push({ x, y, z, w, d, h, c });
    box(XS - 1.3, -1.0, 0, 2.6, 2.0, 0.22, '#e8a33d');             // pancaked torso
    box(XS - 2.6, -0.8, 0, 1.4, 1.6, 0.2, '#5a4632');              // pants
    box(XS - 3.4, -0.5, 0, 0.9, 0.5, 0.24, '#2b2118');             // boots
    box(XS - 3.3, 0.25, 0, 0.9, 0.5, 0.24, '#2b2118');
    box(XS + 1.2, -1.7, 0, 1.3, 0.5, 0.2, '#e8c49a');              // arms out
    box(XS + 1.1, 1.2, 0, 1.3, 0.5, 0.2, '#e8c49a');
    box(XS + 1.5, -0.5, 0, 0.9, 1.0, 0.35, '#e8c49a');             // face-down head
    box(XS + 2.6, 1.6, 0, 1.6, 1.7, 0.14, '#d9b45a');              // hat knocked off
    box(XS + 3.0, 2.0, 0.14, 0.8, 0.9, 0.35, '#c9a44a');
  }

  // ================= render =================
  draw(at, now) {
    const ctx = this.ctx, dpr = this.dpr, cw = innerWidth, ch = innerHeight;
    const smooth = this.props.pixel === 'smooth';
    const k = Math.min(0.55, (smooth ? 780 : 440) / cw);
    const iw = Math.max(80, Math.round(cw * k)), ih = Math.max(60, Math.round(ch * k));
    if (!this.fb || this.fb.iw !== iw || this.fb.ih !== ih) {
      const off = document.createElement('canvas'); off.width = iw; off.height = ih;
      this.fb = { iw, ih, off, octx: off.getContext('2d'), img: off.getContext('2d').createImageData(iw, ih), zb: new Float32Array(iw * ih) };
    }
    const fb = this.fb, data = fb.img.data, zbuf = fb.zb;
    data.fill(0); zbuf.fill(0);
    const F = ih * 1.28, cx = iw / 2, cy = ih / 2, NEAR = 0.35;

    const cam = this.camera(at, now);
    let fx = cam.tx - cam.ex, fy = cam.ty - cam.ey, fz = cam.tz - cam.ez;
    { const l = Math.hypot(fx, fy, fz); fx /= l; fy /= l; fz /= l; }
    let rx = fy, ry = -fx, rz = 0;                          // cross(f, z-up)
    { const l = Math.hypot(rx, ry) || 1; rx /= l; ry /= l; }
    const ux = ry * fz - rz * fy, uy = rz * fx - rx * fz, uz = rx * fy - ry * fx;   // cross(r,f)
    const ex = cam.ex, ey = cam.ey, ez = cam.ez;
    const P = (x, y, z) => {
      const dx = x - ex, dy = y - ey, dz = z - ez;
      const vz = dx * fx + dy * fy + dz * fz;
      const cvz = Math.max(vz, NEAR);
      return { sx: cx + (dx * rx + dy * ry + dz * rz) * F / cvz, sy: cy - (dx * ux + dy * uy + dz * uz) * F / cvz, q: 1 / cvz, vz };
    };

    // flat-shaded tri with per-pixel depth test
    const tri = (p0, p1, p2, r, g, b) => {
      const area = (p1.sx - p0.sx) * (p2.sy - p0.sy) - (p1.sy - p0.sy) * (p2.sx - p0.sx);
      if (area >= 0) return;
      const inv = 1 / area;
      let minX = Math.max(0, Math.floor(Math.min(p0.sx, p1.sx, p2.sx))), maxX = Math.min(iw - 1, Math.ceil(Math.max(p0.sx, p1.sx, p2.sx)));
      let minY = Math.max(0, Math.floor(Math.min(p0.sy, p1.sy, p2.sy))), maxY = Math.min(ih - 1, Math.ceil(Math.max(p0.sy, p1.sy, p2.sy)));
      for (let py = minY; py <= maxY; py++) {
        const yc = py + 0.5;
        for (let px = minX; px <= maxX; px++) {
          const xc = px + 0.5;
          const w0 = ((p1.sx - xc) * (p2.sy - yc) - (p1.sy - yc) * (p2.sx - xc)) * inv;
          const w1 = ((p2.sx - xc) * (p0.sy - yc) - (p2.sy - yc) * (p0.sx - xc)) * inv;
          const w2 = 1 - w0 - w1;
          if (w0 < -0.0001 || w1 < -0.0001 || w2 < -0.0001) continue;
          const q = w0 * p0.q + w1 * p1.q + w2 * p2.q;
          const idx = py * iw + px;
          if (q <= zbuf[idx]) continue;
          zbuf[idx] = q;
          const o = idx * 4;
          data[o] = r; data[o + 1] = g; data[o + 2] = b; data[o + 3] = 255;
        }
      }
    };
    const FOGC = [203, 178, 135];
    const fogMix = (base, vz) => {
      const f = Math.max(0, Math.min(1, (vz - 12) / 55));
      return [base[0] + (FOGC[0] - base[0]) * f, base[1] + (FOGC[1] - base[1]) * f, base[2] + (FOGC[2] - base[2]) * f];
    };
    const SH = { pz: 1.0, nz: 0.5, px: 0.86, nx: 0.6, py: 0.7, ny: 0.82 };
    const quad = (c0, c1, c2, c3, base, br) => {
      const avz = (c0.vz + c1.vz + c2.vz + c3.vz) / 4;
      const col = fogMix(base, avz);
      const r = Math.min(255, col[0] * br) | 0, g = Math.min(255, col[1] * br) | 0, b = Math.min(255, col[2] * br) | 0;
      tri(c0, c1, c2, r, g, b); tri(c0, c2, c3, r, g, b);
    };
    const drawBox = (bx) => {
      const { x, y, z, w, d, h } = bx;
      const c000 = P(x, y, z), c100 = P(x + w, y, z), c110 = P(x + w, y + d, z), c010 = P(x, y + d, z);
      const c001 = P(x, y, z + h), c101 = P(x + w, y, z + h), c111 = P(x + w, y + d, z + h), c011 = P(x, y + d, z + h);
      if (c000.vz < NEAR && c100.vz < NEAR && c110.vz < NEAR && c010.vz < NEAR && c001.vz < NEAR && c101.vz < NEAR && c111.vz < NEAR && c011.vz < NEAR) return;
      const anyClip = c000.vz < NEAR || c100.vz < NEAR || c110.vz < NEAR || c010.vz < NEAR || c001.vz < NEAR || c101.vz < NEAR || c111.vz < NEAR || c011.vz < NEAR;
      if (anyClip) return;
      const base = this.rgbOf(bx.c);
      quad(c001, c101, c111, c011, base, SH.pz);
      quad(c000, c010, c110, c100, base, SH.nz);
      quad(c100, c110, c111, c101, base, SH.px);
      quad(c000, c001, c011, c010, base, SH.nx);
      quad(c010, c011, c111, c110, base, SH.py);
      quad(c000, c100, c101, c001, base, SH.ny);
    };
    // double-sided ground quad (clamped projection)
    const gquad = (x0, y0, x1, y1, col) => {
      const c0 = P(x0, y0, 0), c1 = P(x1, y0, 0), c2 = P(x1, y1, 0), c3 = P(x0, y1, 0);
      if (c0.vz < NEAR && c1.vz < NEAR && c2.vz < NEAR && c3.vz < NEAR) return;
      if (Math.max(c0.sx, c1.sx, c2.sx, c3.sx) < 0 || Math.min(c0.sx, c1.sx, c2.sx, c3.sx) > iw) return;
      if (Math.max(c0.sy, c1.sy, c2.sy, c3.sy) < 0 || Math.min(c0.sy, c1.sy, c2.sy, c3.sy) > ih) return;
      const base = this.rgbOf(col);
      const area = (c1.sx - c0.sx) * (c2.sy - c0.sy) - (c1.sy - c0.sy) * (c2.sx - c0.sx);
      if (area < 0) quad(c0, c1, c2, c3, base, 1.0); else quad(c3, c2, c1, c0, base, 1.0);
    };
    // soft blob (shadows + dust), z-tested, no z-write
    const blob = (x, y, z, wr, col, alpha, flat) => {
      const pr = P(x, y, z); if (pr.vz < NEAR + 0.05) return;
      let rX = wr * F / pr.vz; if (rX < 0.6) return; if (rX > 60) rX = 60;
      const rY = rX * (flat ? 0.38 : 0.8);
      const q = pr.q * 1.003;
      let minX = Math.max(0, Math.floor(pr.sx - rX)), maxX = Math.min(iw - 1, Math.ceil(pr.sx + rX));
      let minY = Math.max(0, Math.floor(pr.sy - rY)), maxY = Math.min(ih - 1, Math.ceil(pr.sy + rY));
      for (let py = minY; py <= maxY; py++) {
        for (let px = minX; px <= maxX; px++) {
          const nx2 = (px - pr.sx) / rX, ny2 = (py - pr.sy) / rY;
          if (nx2 * nx2 + ny2 * ny2 > 1) continue;
          const idx = py * iw + px;
          if (zbuf[idx] >= q) continue;
          const o = idx * 4;
          if (data[o + 3] < 10) { data[o] = col[0]; data[o + 1] = col[1]; data[o + 2] = col[2]; data[o + 3] = alpha * 255; }
          else {
            data[o] = data[o] * (1 - alpha) + col[0] * alpha;
            data[o + 1] = data[o + 1] * (1 - alpha) + col[1] * alpha;
            data[o + 2] = data[o + 2] * (1 - alpha) + col[2] * alpha;
          }
        }
      }
    };

    // ---- sky ----
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const g = ctx.createLinearGradient(0, 0, 0, ch);
    g.addColorStop(0, '#6f9cc4'); g.addColorStop(0.42, '#a8b391'); g.addColorStop(0.62, '#cbb287'); g.addColorStop(1, '#c2a97c');
    ctx.fillStyle = g; ctx.fillRect(0, 0, cw, ch);

    // ---- ground ----
    const H = window.BRArt.hash;
    for (let tx = -72; tx < 34; tx += 4) {
      for (let ty = -14; ty < 14; ty += 4) {
        const onTrack = ty >= -8 && ty < 8;
        const hh = H(tx, ty, 2);
        const col = onTrack ? (hh < 0.5 ? '#b58a5a' : '#ac8253') : (hh < 0.5 ? '#7cbf54' : '#74b64d');
        gquad(tx, ty, tx + 4, ty + 4, col);
      }
    }
    // ---- fences ----
    const boxes = [];
    for (let px2 = -64; px2 <= 30; px2 += 4) {
      for (const side of [-8, 8]) {
        boxes.push({ x: px2 - 0.3, y: side - 0.3, z: 0, w: 0.6, d: 0.6, h: 2.9, c: '#9a7748' });
        boxes.push({ x: px2 - 0.3, y: side - 0.13, z: 1.1, w: 4, d: 0.26, h: 0.3, c: '#7a5a38' });
        boxes.push({ x: px2 - 0.3, y: side - 0.13, z: 2.0, w: 4, d: 0.26, h: 0.3, c: '#7a5a38' });
      }
    }
    // ---- characters ----
    const guy = this.guyX(at), hx = this.herdX(at);
    const running = at >= this.LISTEN_END;
    const bulls = [];
    for (const b of this.herd()) {
      const bxp = hx + b.dx;
      if (bxp < ex - 60 || bxp > ex + 20) continue;
      bulls.push({ x: bxp, y: b.dy });
      this.bullBoxes(boxes, bxp, b.dy, b.coat, now * (running ? 13 : 2) + b.ph, running);
    }
    const standing = at < this.STAMP;
    if (standing) this.guyBoxes(boxes, guy, now * 14, at > this.BEAT_END + 0.05, at >= this.RUSH_END - 0.15, at);
    else this.flatBoxes(boxes);
    for (const bx of boxes) drawBox(bx);

    // ---- shadows + dust (blended, z-tested) ----
    if (standing) blob(guy, 0, 0.03, 1.5, [70, 52, 30], 0.32, true);
    for (const b of bulls) blob(b.x + 0.5, b.y, 0.03, 3.4, [70, 52, 30], 0.3, true);
    for (const d of this.parts) {
      const a = (1 - d.age / d.life) * 0.42;
      blob(d.x, d.y, d.z, d.r0 * (1 + d.age * 1.6), [214, 192, 148], a, false);
    }

    // ---- upscale (chunky pixels) ----
    fb.octx.putImageData(fb.img, 0, 0);
    const sk = this.shakeAmt(at);
    const shx = sk ? (Math.random() - 0.5) * sk : 0, shy = sk ? (Math.random() - 0.5) * sk : 0;
    ctx.imageSmoothingEnabled = smooth;
    ctx.drawImage(fb.off, 0, 0, iw, ih, shx, shy, cw, ch);

    // css-space projection for overlays
    const projCss = (x, y, z) => { const p = P(x, y, z); return { x: (p.sx / iw) * cw + shx, y: (p.sy / ih) * ch + shy, vz: p.vz }; };

    // ---- 2D dust wall at the herd (they emerge through it) ----
    if (at > this.LISTEN_END && at < this.STAMP) {
      const hp = projCss(hx + 3, 0, 2.5);
      if (hp.vz > 2) {
        const fade = 1 - this.ss((at - this.RUSH_END) / (this.STAMP - this.RUSH_END));
        const rad = Math.min(cw * 0.75, 300 * F / hp.vz * (cw / iw) * 0.02 + cw * 0.32);
        const rg = ctx.createRadialGradient(hp.x, hp.y, 10, hp.x, hp.y, rad);
        rg.addColorStop(0, 'rgba(206,182,138,' + (0.55 * fade).toFixed(2) + ')');
        rg.addColorStop(1, 'rgba(206,182,138,0)');
        ctx.fillStyle = rg; ctx.beginPath(); ctx.ellipse(hp.x, hp.y, rad, rad * 0.7, 0, 0, 7); ctx.fill();
      }
    }

    // ================= overlay =================
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const head = projCss(guy, 0, 7.4);

    if (at < this.IDLE_END) {                                   // whistle notes
      const m = projCss(0, 0, 6.3);
      for (let i = 0; i < 3; i++) {
        const ph = (at * 0.7 + i * 0.34) % 1, a = Math.sin(ph * Math.PI);
        ctx.font = (17 + i * 4) + 'px system-ui, sans-serif';
        ctx.fillStyle = 'rgba(243,231,205,' + (a * 0.9).toFixed(2) + ')';
        ctx.fillText(['♪', '♫', '♪'][i], m.x + 26 + Math.sin(ph * 6 + i) * 13, m.y - 20 - ph * 90);
      }
    }
    if (at >= this.IDLE_END && at < this.RUSH_END) {            // "?"
      const a = this.ss((at - this.IDLE_END) / 0.4) * (1 - this.ss((at - (this.RUSH_END - 0.4)) / 0.4));
      const wob = Math.sin(at * 5) * 5;
      ctx.font = "700 52px 'Pixelify Sans', sans-serif";
      ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(23,16,10,' + (a * 0.9).toFixed(2) + ')';
      ctx.strokeText('?', head.x + wob, head.y - 14);
      ctx.fillStyle = 'rgba(243,231,205,' + a.toFixed(2) + ')'; ctx.fillText('?', head.x + wob, head.y - 14);
    }
    if (at >= this.RUSH_END - 0.15 && at < this.STAMP) {        // "!"
      const t0 = at - (this.RUSH_END - 0.15);
      const s2 = 0.6 + 0.4 * this.ss(Math.min(1, t0 / 0.18));
      ctx.font = "700 " + Math.round(74 * s2) + "px 'Pixelify Sans', sans-serif";
      ctx.lineWidth = 7; ctx.strokeStyle = 'rgba(23,16,10,.95)'; ctx.strokeText('!', head.x, head.y - 20);
      ctx.fillStyle = '#e2483a'; ctx.fillText('!', head.x, head.y - 20);
    }
    if (at >= this.STAMP && at < this.STAMP + 0.6) {            // impact
      const a = 1 - (at - this.STAMP) / 0.6, jig = (Math.random() - 0.5) * 9;
      const p = projCss(this.XS, 0, 4);
      ctx.font = "700 84px 'Pixelify Sans', sans-serif";
      ctx.lineWidth = 8; ctx.strokeStyle = 'rgba(23,16,10,' + a.toFixed(2) + ')';
      ctx.strokeText('STOMP!', p.x + jig, p.y - 60 + jig);
      ctx.fillStyle = 'rgba(242,178,58,' + a.toFixed(2) + ')'; ctx.fillText('STOMP!', p.x + jig, p.y - 60 + jig);
    }
    if (at >= this.STAMP) {                                     // white impact flash
      const fl = Math.max(0, 1 - (at - this.STAMP) / 0.16);
      if (fl > 0) { ctx.fillStyle = 'rgba(255,244,220,' + (fl * 0.7).toFixed(2) + ')'; ctx.fillRect(0, 0, cw, ch); }
    }
    if (at > this.EXIT + 0.6) {                                 // dizzy stars over the pancake
      const sp = projCss(this.XS + 1.9, -0.1, 1.6);
      ctx.font = "20px system-ui, sans-serif";
      for (let i = 0; i < 3; i++) {
        const ang = at * 3 + i * (Math.PI * 2 / 3);
        ctx.fillStyle = 'rgba(255,236,150,' + (0.5 + 0.45 * Math.sin(ang)).toFixed(2) + ')';
        ctx.fillText('✦', sp.x + Math.cos(ang) * 34, sp.y - 26 + Math.sin(ang) * 10);
      }
    }

    // vignette
    const vg = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.32, cw / 2, ch / 2, Math.max(cw, ch) * 0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(10,7,4,.48)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, cw, ch);

    // letterbox
    let bar = 0;
    if (this.props.letterbox !== false) { bar = Math.round(ch * 0.075); ctx.fillStyle = '#0b0906'; ctx.fillRect(0, 0, cw, bar); ctx.fillRect(0, ch - bar, cw, bar); }

    // intro title
    if (this.state.started && at < this.IDLE_END + 1.2) {
      const a = this.ss(at / 0.5) * (1 - this.ss((at - (this.IDLE_END + 0.4)) / 0.7));
      ctx.textAlign = 'left';
      ctx.font = "700 44px 'Pixelify Sans', sans-serif";
      ctx.fillStyle = 'rgba(23,16,10,' + (a * 0.85).toFixed(2) + ')'; ctx.fillText('THE CHASE', 42, ch - bar - 40);
      ctx.fillStyle = 'rgba(242,178,58,' + a.toFixed(2) + ')'; ctx.fillText('THE CHASE', 40, ch - bar - 42);
      ctx.font = "600 15px 'Pixelify Sans', sans-serif";
      ctx.fillStyle = 'rgba(243,231,205,' + (a * 0.8).toFixed(2) + ')'; ctx.fillText('San Fermín Oval · opening morning · in 3D', 42, ch - bar - 22);
      ctx.textAlign = 'center';
    }
    // end card
    if (at > this.EXIT + 0.4) {
      const a = this.ss((at - (this.EXIT + 0.4)) / 0.8);
      ctx.font = "700 58px 'Pixelify Sans', sans-serif";
      ctx.lineWidth = 7; ctx.strokeStyle = 'rgba(23,16,10,' + (a * 0.9).toFixed(2) + ')';
      ctx.strokeText('TRAMPLED.', cw / 2, ch * 0.3); ctx.fillStyle = 'rgba(242,178,58,' + a.toFixed(2) + ')'; ctx.fillText('TRAMPLED.', cw / 2, ch * 0.3);
      ctx.font = "600 16px 'Pixelify Sans', sans-serif";
      ctx.fillStyle = 'rgba(243,231,205,' + (a * 0.7).toFixed(2) + ')'; ctx.fillText('maybe don\u2019t whistle on the track next year', cw / 2, ch * 0.3 + 44);
    }
  }

  audioTick(a, b) {
    const S = window.BRSfx; if (!S) return;
    const step = (intv, from, fn) => { if (Math.floor((b - from) / intv) > Math.floor((a - from) / intv)) fn(); };
    const cross = (th, fn) => { if (a < th && b >= th) fn(); };
    if (b < this.IDLE_END) step(1.35, 0.25, () => S.chime());
    if (b >= this.LISTEN_END && b < this.RUSH_END) step(0.5, this.LISTEN_END, () => S.whoosh());
    cross(this.RUSH_END - 0.15, () => { S.horn(); S.whoosh(); });
    if (b >= this.RUSH_END && b < this.EXIT) step(0.15, this.RUSH_END, () => S.hammer());
    cross(this.STAMP, () => { S.error(); S.hammer(); S.whoosh(); });
  }

  renderVals() {
    return {
      canvasRef: this.canvasRef,
      started: this.state.started,
      showPlay: !this.state.started,
      onPlay: this.onPlay,
      onReplay: this.onReplay
    };
  }
}
</script>
