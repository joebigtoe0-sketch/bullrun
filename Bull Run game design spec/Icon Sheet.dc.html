<body>
<x-dc>
<helmet>

<style>
html,body{margin:0;padding:0;background:#241f18}
a{color:#f2b23a}a:hover{color:#f8c65c}
</style>
</helmet>

<div style="min-height:100vh;background:#241f18;font-family:'Pixelify Sans',system-ui,sans-serif;color:#f3e7cd;padding:26px 30px 60px;box-sizing:border-box" data-screen-label="Icon sheet">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px">
    <a href="Bull Run Prototype.dc.html" style="display:inline-flex;align-items:center;gap:7px;background:rgba(30,23,15,.88);border:1px solid rgba(243,231,205,.14);border-radius:12px;padding:7px 14px;color:#f3e7cd;font-size:14px;font-weight:700;text-decoration:none">← Back to the ranch</a>
    <div style="text-align:center">

      <div style="color:#8f7f63;font-size:13px;font-weight:600">24×24 inline SVG · flat, 2px ink strokes, palette colors</div>
    </div>
    <div style="width:150px"></div>
  </div>
